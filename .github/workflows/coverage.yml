name: Coverage

permissions:
  contents: read

# Temporarily disabled: daemon session timeouts under llvm-cov instrumentation
# cause flaky failures (~50% of runs). Needs retry logic or increased timeouts.
# See: https://github.com/git-ai-project/git-ai/pull/1178
on:
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  # Coverage threshold is set to current coverage (54.10%) rounded down to nearest 5%
  # This ensures code coverage never falls below this baseline
  COVERAGE_THRESHOLD: 50

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.93.0"
          components: llvm-tools-preview

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install Graphite CLI
        run: npm install -g @withgraphite/graphite-cli@stable

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run tests with coverage
        run: |
          cargo llvm-cov test \
            --ignore-filename-regex='tests/.*|benches/.*|examples/.*' \
            --lcov \
            --output-path lcov.info \
            --fail-under-lines $COVERAGE_THRESHOLD \
            -- --skip performance_regression

      - name: Generate HTML coverage report
        if: always()
        run: |
          cargo llvm-cov report \
            --ignore-filename-regex='tests/.*|benches/.*|examples/.*' \
            --html \
            --output-dir target/coverage

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: target/coverage/
          retention-days: 30

      - name: Upload LCOV report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lcov-report
          path: lcov.info
          retention-days: 30
